description: >-
  Science Applications International Corporation (SAIC) is a Reston, Virginia
  based technology integrator that delivers mission IT, enterprise IT,
  engineering services, and professional services to U.S. federal civilian,
  defense, intelligence community, and space customers. With approximately
  24,000 employees and roughly $7.3 billion in annual revenue, SAIC focuses
  on direct technical support and integration for government organizations,
  spanning CJADC2, data and AI, digital transformation, quantum technologies,
  cloud, cybersecurity, digital workplace, digital engineering, and systems
  integration. SAIC has expanded its capabilities through acquisitions
  including Engility (2018), Unisys Federal (2020), Halfaker (2021, DoD
  healthcare), Koverse (2021, secure data lake for classified environments),
  and Forfeiture Support Associates (2023). No public REST APIs, developer
  portal, OpenAPI specifications, SDKs, or open source GitHub organization
  have been identified for SAIC — its software and platforms are delivered
  under federal contract to government customers rather than as
  externally-consumable developer products.
